<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="Blue Motion Ninja Studio — AR-style hand tracking with neon canvas effects." />
  <meta name="theme-color" content="#00060f" />
  <title>Blue Motion Ninja Studio — AR Overlay</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- MediaPipe — pinned stable versions -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <p class="logo-text">BLUE MOTION<br/>NINJA STUDIO</p>
    <p class="logo-sub">AR OVERLAY SYSTEM · v3.0</p>
    <div class="loading-bar-wrap"><div class="loading-bar-fill"></div></div>
    <p class="loading-status" id="load-status">INITIALIZING...</p>
  </div>

  <!-- MAIN SCENE -->
  <div id="scene">
    <!-- MediaPipe Camera feeds this video element -->
    <video id="webcam" autoplay muted playsinline></video>

    <div id="scanline"></div>
    <div id="vignette"></div>
    <div id="ripple-overlay"></div>

    <canvas id="ar-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div id="fps-counter">-- FPS</div>

      <!-- Score top-center -->
      <div id="top-bar">
        <div class="hud-badge">
          <span class="hud-label">SCORE</span>
          <span class="hud-value" id="score-val">0</span>
        </div>
      </div>

      <!-- Mode buttons top-right -->
      <div id="mode-buttons">
        <button class="mode-btn active" id="btn-draw" onclick="setMode('draw')">✦ DRAW</button>
        <button class="mode-btn"        id="btn-ninja" onclick="setMode('ninja')">⚔ NINJA</button>
      </div>

      <!-- Status bottom-left -->
      <div id="track-status">● WAITING FOR HAND...</div>

      <!-- Gesture hint bottom-center -->
      <p id="gesture-hint">POINT YOUR INDEX FINGER AT THE CAMERA</p>

      <!-- Corner brackets -->
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>

    <div id="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
